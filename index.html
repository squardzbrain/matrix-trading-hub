<section>
  <h2>Dashboard Preview</h2>
  <div style="border:1px solid #00ff00; padding:10px; box-shadow:0 0 10px #00ff00;">
    <div class="tradingview-widget-container">
      <div id="tradingview_chart"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
      <script type="text/javascript">
        new TradingView.widget({
          "width": "100%",
          "height": 500,
          "symbol": "BINANCE:BTCUSDT",
          "interval": "60",
          "timezone": "Etc/UTC",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "toolbar_bg": "#000000",
          "container_id": "tradingview_chart"
        });
      </script>
    </div>
  </div>
</section>

<canvas id="matrixCanvas"></canvas>
<div id="sentimentDisplay" style="color:#00ff00; font-family:'Courier New'; margin:10px; font-size:18px;">
  Neutral
</div>

<script>
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = Array.from({ length: columns }).fill(1);

  let rainColor = '#00ff00'; // default green
  let sentimentText = "Neutral";

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = rainColor;
    ctx.font = fontSize + 'px Courier New';

    for (let i = 0; i < drops.length; i++) {
      const text = letters.charAt(Math.floor(Math.random() * letters.length));
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(draw, 33);

  // 🔎 Update rain color based on buy vs sell pressure
  function updateSentiment(buyPressure, sellPressure) {
    const total = buyPressure + sellPressure;
    const bullishPercent = (buyPressure / total) * 100;
    const bearishPercent = (sellPressure / total) * 100;

    if (bullishPercent > bearishPercent) {
      rainColor = '#00ff00'; // green neon
      sentimentText = bullishPercent.toFixed(1) + "% Bullish";
    } else {
      rainColor = '#ff0000'; // red neon
      sentimentText = bearishPercent.toFixed(1) + "% Bearish";
    }

    const display = document.getElementById("sentimentDisplay");
    display.innerText = sentimentText;
    display.style.color = rainColor;
  }

  // Example: simulate indicator values (replace with your real indicator feed)
  setInterval(() => {
    const buyPressure = Math.floor(Math.random() * 100);
    const sellPressure = Math.floor(Math.random() * 100);
    updateSentiment(buyPressure, sellPressure);
  }, 5000);
</script>

<style>
  #matrixCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1; /* Behind your content */
    background: black;
  }
</style>
